<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/my_avator.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>North Mountain Photos </title>
</head>
<body>
    <div class="container-fluid photos p-5">
        <div class="back-nav text-center">

            <button type="button" class="back-btn"><a href="index.html">North  Home</a></button>
        </div>
        <div class="container row row-cols-xl-4 row-cols-lg-3 row-cols-md-2 mx-auto justify-content-evenly mt-5">
            <div class="col text-center photo-item"><img src="/images/photos-20.jpg" alt="" width="240px"></div>

            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-8.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-18.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-19.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-16.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-21.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-28.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-29.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-2.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-33.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-34.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-35.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-4.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-5.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-6.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-7.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-9.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-10.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-11.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-12.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-13.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-14.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-15.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-25.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-26.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-27.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-30.jpg" alt="" width="240px"></div>
            <div class="col text-center photo-item"><img src="/images/photos-31.jpg" alt="" width="240px"></div>
            <div class="col text-center mt-5 pt-5 photo-item"><img src="/images/photos-32.jpg" alt="" width="240px"></div>
        </div>
        <!-- 悬浮按钮 -->
        <div class="fly-box"><button class="fly-btn" id="backToTop" onclick="scrollToTop()">Back Top</button></div>
        <!-- 全屏显示容器，添加导航箭头 -->
        <div class="photo-overlay" id="photoOverlay">
            <span class="nav-arrow prev" id="prevArrow">&lt;</span>
            <img src="" alt="Full Screen Image" id="fullImage">
            <span class="nav-arrow next" id="nextArrow">&gt;</span>
        </div>
    </div>

    <script>
        // 获取元素
        const photoItems = document.querySelectorAll('.photo-item');
        const photoOverlay = document.getElementById('photoOverlay');
        const fullImage = document.getElementById('fullImage');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        
        let currentIndex = -1; // 当前显示图片的索引
        const photos = Array.from(photoItems).map(item => item.querySelector('img').src); // 所有图片的 src 数组

        // 显示图片函数
        function showImage(index) {
            if (index >= 0 && index < photos.length) {
                currentIndex = index;
                fullImage.src = photos[currentIndex];
                photoOverlay.classList.add('show');
            }
        }

        // 为每张图片添加点击事件
        photoItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                showImage(index);
            });
        });

        // 点击背景关闭
        photoOverlay.addEventListener('click', (e) => {
            if (e.target === photoOverlay) {
                photoOverlay.classList.remove('show');
                currentIndex = -1; // 重置索引
            }
        });

        // 导航箭头点击事件
        prevArrow.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡到 overlay
            if (currentIndex > 0) {
                showImage(currentIndex - 1);
            }
        });

        nextArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex < photos.length - 1) {
                showImage(currentIndex + 1);
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!photoOverlay.classList.contains('show')) return;

            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                showImage(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < photos.length - 1) {
                showImage(currentIndex + 1);
            } else if (e.key === 'Escape') {
                photoOverlay.classList.remove('show');
                currentIndex = -1;
            }
        });

        // 鼠标左右键控制
        photoOverlay.addEventListener('mousedown', (e) => {
            // 只允许在图片本身点击左右键切换
            if (e.target === fullImage) {
                if (e.button === 0 && currentIndex > 0) { // 左键
                    showImage(currentIndex - 1);
                } else if (e.button === 2 && currentIndex < photos.length - 1) { // 右键
                    showImage(currentIndex + 1);
                }
            }
        });
        // 禁用右键默认菜单
        photoOverlay.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });


        // 回到顶部按钮的
        //添加事件监听
        document.addEventListener("DOMContentLoaded",function(){
            const backToTopButton = document.getElementById("backToTop");
            function toggleButtonVisibility(){
                const scrollHeight = document.documentElement.scrollHeight;//页面总高度
                const viewportHeight = window.innerHeight;//视口高度
                const scrollPosition = window.scrollY;//当前位置
                if(scrollHeight>=2*viewportHeight && scrollPosition>800){
                backToTopButton.style.display = "block";
                }else{
                backToTopButton.style.display = "none";
                 }
            }
            window.addEventListener("scroll",toggleButtonVisibility);
            toggleButtonVisibility();
        });
        function scrollToTop(){
            window.scrollTo({top:0,behavior:'smooth'});
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
